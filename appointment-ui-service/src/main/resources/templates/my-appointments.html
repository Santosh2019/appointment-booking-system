<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Appointments</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="mb-0">My Appointments</h2>
            <small class="text-primary">
                👤 Welcome, <strong th:text="${patientName}"></strong>
            </small>
        </div>

        <a href="/auth/logout" class="btn btn-outline-danger">Logout</a>

    </div>

    <!-- No Appointment -->
    <div th:if="${#lists.isEmpty(appointments)}" class="alert alert-info">
        No appointments found.
    </div>

    <!-- Appointment Table -->
    <div th:if="${!#lists.isEmpty(appointments)}">

        <table class="table table-bordered table-hover bg-white shadow">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Day</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="appt : ${appointments}">

                <td th:text="${appt.appointmentId}"></td>

                <td th:text="${appt.date}"></td>

                <td th:text="${appt.time}"></td>

                <td th:text="${appt.day}"></td>

                <td>
                <span class="badge"
                      th:classappend="${appt.status=='CONFIRMED'} ? 'bg-success' :
                                      (${appt.status=='CANCELLED'} ? 'bg-danger' : 'bg-warning')"
                      th:text="${appt.status}">
                </span>
                </td>

                <td>

                    <form th:if="${appt.status!='CANCELLED'}"
                          th:action="@{/appointments/cancel/{id}(id=${appt.appointmentId})}"
                          method="post">

                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Are you sure you want to cancel this appointment?')">
                            Cancel
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <a th:href="@{/dashboard}" class="btn btn-primary mt-3">
        Back to Home
    </a>

</div>

</body>

</html>
