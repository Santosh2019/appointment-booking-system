<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f5f8fc; }
        .status{ font-weight:600; }
        .SCHEDULED{ color:#ffc107; }
        .CONFIRMED{ color:#0d6efd; }
        .COMPLETED{ color:#198754; }
        .CANCELLED{ color:#dc3545; }
        .card{ border-radius:12px; }
        .top-buttons{ margin-bottom: 20px; }

    </style>
</head>
<body>
<div class="container mt-5">

    <!-- Top buttons: Back to Dashboard + Logout -->
    <div class="top-buttons d-flex justify-content-between">
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
        </a>

        <a th:href="@{/logout}" class="btn btn-outline-danger">
            <i class="fas fa-sign-out-alt me-1"></i> Logout
        </a>
    </div>

    <!-- Doctor welcome -->
    <h5 class="mb-3">
        Welcome
        <span th:text="${session.loggedInDoctorName}"></span>
        (<span th:text="${session.loggedInDoctorQualification}"></span>)
    </h5>

    <h3 class="mb-4">Your Appointments</h3>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Patient</th>
                    <th>Date</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appt : ${appointments}">
                    <td th:text="${appt.fullName}"></td>
                    <td th:text="${appt.appointmentDate}"></td>
                    <td th:text="${appt.reason}"></td>
                    <td><span th:text="${appt.status}" th:class="'status ' + ${appt.status}"></span></td>
                    <td>
                        <a th:href="@{'/appointments/confirm/' + ${appt.appointmentId}}"
                           class="btn btn-sm btn-success"
                           th:if="${appt.status == 'SCHEDULED'}">Confirm</a>

                        <a th:href="@{'/appointments/cancel/' + ${appt.appointmentId}}"
                           class="btn btn-sm btn-danger"
                           th:if="${appt.status == 'SCHEDULED'}">Cancel</a>

                        <a th:href="@{'/appointments/complete/' + ${appt.appointmentId}}"
                           class="btn btn-sm btn-primary"
                           th:if="${appt.status == 'CONFIRMED'}">Complete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>

</body>
</html>
