<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Appointment Confirmed</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fa; }
        .container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; }
        .header { background: #28a745; color: white; padding: 25px; text-align: center; }
        .content { padding: 30px 25px; }
        .details { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .label { font-weight: bold; color: #555; }


    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="fas fa-check-circle"></i> Appointment Confirmed</h2>
    </div>
    <div class="content">
        <h3>Dear <strong th:text="${patientName}"></strong>,</h3>

        <p>Your appointment has been successfully booked!</p>

        <div class="details">
            <p><span class="label">Appointment ID:</span> <strong th:text="${appointmentId}"></strong></p>
            <p><span class="label">Doctor:</span> Dr. <span th:text="${doctorName}"></span> (<span
                    th:text="${specialization}"></span>)</p>
            <p><span class="label">Date:</span> <span th:text="${date}"></span></p>
            <p><span class="label">Time:</span> <span th:text="${time}"></span></p>
            <p><span class="label">Reason:</span> <span th:text="${reason}"></span></p>
        </div>

        <p>Please arrive 10 minutes early.</p>
        <p>Bring your Patient ID and any previous reports if applicable.</p>

        <hr>
        <p>Thank you for choosing City Hospital.</p>
    </div>
</div>
</body>
</html>
