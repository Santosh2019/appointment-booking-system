<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - Appointment System</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="alert alert-danger">
    <h1>Something went wrong</h1>

    <p th:if="${status != null}">
        <strong>Status:</strong> <span th:text="${status}"></span>
    </p>

    <p th:if="${message != null}">
        <strong>Message:</strong> <span th:text="${message}"></span>
    </p>

    <p>
        <strong>Time:</strong>
        <span th:text="${timestamp} ?: 'N/A'"></span>
    </p>

    <div th:if="${error != null}">
        <h4>Details (for support):</h4>
        <pre th:text="${error}"></pre>
    </div>
</div>

<a href="/" class="btn btn-primary">Back to Home</a>
<a href="/auth/login" class="btn btn-outline-secondary ms-2">Login again</a>

</body>
</html>
