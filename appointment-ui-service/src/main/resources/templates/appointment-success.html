<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booked Successfully</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-light py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white text-center py-4">
                    <h3 class="mb-0">
                        <i class="fas fa-check-circle me-2"></i>Success!
                    </h3>
                </div>
                <div class="card-body text-center py-5">
                    <div class="alert alert-success mb-4" role="alert">
                        <h4 class="alert-heading mb-3">Appointment Confirmed</h4>
                        <p class="lead">
                            Dear <strong th:text="${appointmentResponse.fullName}"></strong>,
                            your appointment has been successfully booked.
                        </p>

                        <hr class="my-4">

                        <div class="text-start mx-auto" style="max-width: 400px;">
                            <p class="mb-3">
                                <strong>Appointment ID:</strong>
                                <span class="badge bg-success ms-2"
                                      th:text="${appointmentResponse.appointmentId}"></span>
                            </p>
                            <p class="mb-3">
                                <strong>Doctor:</strong>
                                <span th:text="${appointmentResponse.doctorName}"></span>
                                (<span th:text="${appointmentResponse.specialization}"></span>)
                            </p>
                            <p class="mb-3">
                                <strong>Date & Day:</strong>
                                <span th:text="${appointmentResponse.date}"></span>
                                (<span th:text="${appointmentResponse.day}"></span>)
                            </p>
                            <p class="mb-3">
                                <strong>Time:</strong>
                                <span th:text="${appointmentResponse.time}"></span>
                            </p>
                            <p class="mb-0">
                                <strong>Reason:</strong>
                                <span th:text="${appointmentResponse.reason}"></span>
                            </p>
                        </div>

                        <hr class="my-4">

                        <p class="text-muted mb-0">
                            A confirmation has been sent to your registered contact details.<br>
                            Thank you for choosing us!
                        </p>
                    </div>

                    <div class="d-grid gap-3 d-md-flex justify-content-md-center mt-4">
                        <a th:href="@{/dashboard}" class="btn btn-primary btn-lg">
                            <i class="fas fa-home me-2"></i> Go to Dashboard
                        </a>
                        <a th:href="@{/appointments/book}" class="btn btn-outline-primary btn-lg">
                            <i class="fas fa-calendar-plus me-2"></i> Book Another
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
