<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

body{
background:#f5f8fc;
font-family:"Segoe UI";
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
}

.sidebar h4{
font-weight:600;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
margin-bottom:8px;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* CARDS */

.dashboard-card{
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
padding:20px;
}

.card-icon{
font-size:2rem;
color:#0d6efd;
}


    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar">

            <h4><i class="fas fa-hospital"></i> Admin</h4>

            <a href="/admin/dashboard">
                <i class="fas fa-chart-line me-2"></i> Dashboard
            </a>

            <a href="/admin/patients">
                <i class="fas fa-users me-2"></i> Patients
            </a>

            <a href="/admin/doctors">
                <i class="fas fa-user-md me-2"></i> Doctors
            </a>

            <a href="/admin/appointments">
                <i class="fas fa-calendar-check me-2"></i> Appointments
            </a>

        </div>

        <!-- MAIN CONTENT -->

        <div class="col-md-10 p-4">

            <h3 class="mb-4">Admin Dashboard</h3>

            <!-- STATS CARDS -->

            <div class="row g-4">

                <div class="col-md-4">

                    <div class="dashboard-card bg-white">

                        <i class="fas fa-users card-icon"></i>

                        <h5 class="mt-3">Total Patients</h5>

                        <h2 th:text="${totalPatients}"></h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="dashboard-card bg-white">

                        <i class="fas fa-user-md card-icon"></i>

                        <h5 class="mt-3">Total Doctors</h5>

                        <h2 th:text="${totalDoctors}"></h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="dashboard-card bg-white">

                        <i class="fas fa-calendar-check card-icon"></i>

                        <h5 class="mt-3">Total Appointments</h5>

                        <h2 th:text="${totalAppointments}"></h2>

                    </div>

                </div>

            </div>

            <br>

            <!-- CHART -->

            <div class="card shadow p-4">

                <h5>Appointments Per Day</h5>

                <canvas id="chart"></canvas>

            </div>

            <br>

            <!-- RECENT APPOINTMENTS -->

            <div class="card shadow p-4">

                <h5>Recent Appointments</h5>

                <table class="table table-striped">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr>
                        <td>APP001</td>
                        <td>Rahul</td>
                        <td>Dr Amit</td>
                        <td>2026-03-14</td>
                    </tr>

                    <tr>
                        <td>APP002</td>
                        <td>Priya</td>
                        <td>Dr Kiran</td>
                        <td>2026-03-14</td>
                    </tr>

                    <tr>
                        <td>APP003</td>
                        <td>Amit</td>
                        <td>Dr Rahul</td>
                        <td>2026-03-14</td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

new Chart(document.getElementById("chart"),{

type:'bar',

data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
label:"Appointments",
data:[10,15,8,20,18]
}]
}

});


</script>

</body>
</html>
