<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Login | Hospital Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{ background-color:#f5f8fc; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI', sans-serif; }
        .login-card{ width:420px; background:#fff; border-radius:16px; box-shadow:0 15px 35px rgba(0,0,0,0.15); overflow:hidden; }
        .login-header{ background-color:#0d6efd; color:white; padding:35px; text-align:center; }
        .login-body{ padding:35px; }
        .btn-login{ background-color:#0d6efd; border:none; height:48px; font-weight:600; border-radius:10px; }
        .btn-login:hover{ background-color:#0b5ed7; box-shadow:0 8px 20px rgba(13,110,253,0.4); }

        .btn-back-dashboard {
            transition: all 0.3s ease;
        }
        .btn-back-dashboard:hover {
            background-color: #e6f0ff !important;
            border-color: #a5d8ff !important;
            color: #004085 !important;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15) !important;
            transform: translateY(-1px) !important;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="login-header">
        <i class="fas fa-hospital"></i>
        <h4>Hospital Management System</h4>
        <p class="mb-0">Secure Login</p>
    </div>

    <div class="login-body">

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            Invalid email or date of birth. Please check and try again.
        </div>

        <div sec:authorize="isAuthenticated()" class="mb-4">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary w-100 btn-back-dashboard">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>

        <form th:action="@{/auth/login}" method="post">

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required
                       autofocus>
                <label for="email"><i class="fas fa-envelope me-2"></i>Email address</label>
            </div>

            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="dob" name="dob"
                       placeholder="yyyy-MM-dd" required>
                <label for="dob"><i class="fas fa-calendar-alt me-2"></i>Date of Birth</label>
                <small class="form-text text-muted mt-1">Format: yyyy-MM-dd (used as password)</small>
            </div>

            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

    </div>
</div>

</body>
</html>
