# ────────────────────────────────────────────────
# Application & Thymeleaf
# ────────────────────────────────────────────────
spring.application.name=appointment-ui-service
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true
# ────────────────────────────────────────────────
# Database (MySQL)
# ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ────────────────────────────────────────────────
# JPA / Hibernate
# ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ────────────────────────────────────────────────
# Disable unwanted auto-configurations
# ────────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
# ────────────────────────────────────────────────
# Very important → Server Port
# ────────────────────────────────────────────────
server.port=9096
feign.client.config.doctor-service.url=http://localhost:9091
logging.level.org.springframework=DEBUG
logging.level.org.springframework.beans.factory=TRACE
logging.level.org.thymeleaf=DEBUG
logging.level.org.springframework.expression=DEBUG
# Very important during troubleshooting
logging.level.org.thymeleaf.spring6=DEBUG
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s
# Expose actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
# Show details in health endpoint
management.endpoint.health.show-details=always
# Prometheus metrics export
management.metrics.export.prometheus.enabled=true