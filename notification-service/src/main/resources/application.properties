# ────────────────────────────────────────────────
# Application & Thymeleaf
# ────────────────────────────────────────────────
spring.application.name=notification-service
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true
# ────────────────────────────────────────────────
# Database (MySQL)
# ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ────────────────────────────────────────────────
# JPA / Hibernate
# ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ────────────────────────────────────────────────
# Disable unwanted auto-configurations
# SMTP Configuration (Gmail example - App Password use kara)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=santoshlimbale76@gmail.com
spring.mail.password=mjcyvyujdnwbkwbs
# ────────────────────────────────────────────────
# ────────────────────────────────────────────────
# Very important → Server Port
# ────────────────────────────────────────────────
app.mail.from=Appointment System <santoshlimbale76@gmail.com>
server.port=9097
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#logging.level.org.springframework=DEBUG
#logging.level.org.springframework.beans.factory=TRACE
# Very important during troubleshooting
#logging.level.org.thymeleaf.spring6=DEBUG
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s
# Expose actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
# Show details in health endpoint
management.endpoint.health.show-details=always
# Prometheus metrics export
management.metrics.export.prometheus.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
